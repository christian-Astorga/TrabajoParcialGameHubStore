server.port=8087
spring.application.name=payment-service

# Conexión directa a tu Laragon local
spring.datasource.url=jdbc:mysql://localhost:3306/gamehub_payments?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate automático para armar las tablas al encender
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true