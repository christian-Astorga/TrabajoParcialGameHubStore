# Puerto único para el microservicio de Autenticación
server.port=8081

# Configuración de la conexión a Laragon
spring.datasource.url=jdbc:mysql://localhost:3306/gamehub_auth?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Configuración limpia de Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true