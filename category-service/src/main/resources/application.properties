# Configuración del servidor y nombre del microservicio
server.port=8084
spring.application.name=category-service

# Configuración de la Base de Datos en Laragon
spring.datasource.url=jdbc:mysql://localhost:3306/gamehub_category_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Registro en el Servidor Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

# Habilitar la documentación de Swagger de forma clara
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html