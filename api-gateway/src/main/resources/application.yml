server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: payment-service-route
          uri: lb://payment-service
          predicates:
            - Path=/api/pagos/**


        - id: product-service-route
          uri: lb://Product-service
          predicates:
            - Path=/api/productos/**


eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    registerWithEureka: true
    fetchRegistry: true
  instance:
    preferIpAddress: true