# Puerto único para el servicio de Productos (Rúbrica: No choca con Auth)
server.port=8082

# Configuración de Conexión a Base de Datos en Laragon
spring.datasource.url=jdbc:mysql://localhost:3306/gamehub_products?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate para auto-creación de tablas (Code-First)
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Nombre lógico del microservicio
spring.application.name=product-service

# Registro en el Servidor de Descubrimiento Eureka
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.registerWithEureka=true
eureka.client.fetchRegistry=true
eureka.instance.preferIpAddress=true
