server:
  port: 8086

spring:
  application:
    name: order-service

  # Configuración de la Base de Datos en Laragon para Órdenes
  datasource:
    url: jdbc:mysql://localhost:3306/gamehub_order_db?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Configuración de Hibernate / JPA
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html