spring.application.name=user-service
server.port=8083

# Configuración de base de datos independiente en Laragon/MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/gamehub_user_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Desactivar advertencia de vista abierta
spring.jpa.open-in-view=false